<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gedface</title>
<style>
  /* ── Reset ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: #161822;
    border-bottom: 1px solid #2a2d3a;
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 24px;
  }
  header h1 { font-size: 20px; font-weight: 600; color: #a5f3c4; flex-shrink: 0; }

  .tabs { display: flex; height: 100%; }
  .tab {
    padding: 0 18px;
    border: none;
    background: transparent;
    color: #6b6b8a;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s;
    position: relative;
    font-family: inherit;
    display: flex;
    align-items: center;
    height: 100%;
  }
  .tab:hover { color: #c0c0d0; }
  .tab.active { color: #e0e0e0; border-bottom-color: #a5f3c4; }
  .tab.has-update::after {
    content: '';
    width: 7px; height: 7px;
    background: #a5f3c4;
    border-radius: 50%;
    position: absolute;
    top: 14px; right: 8px;
  }

  .stats {
    margin-left: auto;
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: #8888aa;
    flex-shrink: 0;
  }
  .stats span { color: #a5f3c4; font-weight: 600; }

  /* ── Views ── */
  .view { display: none; }
  #view-scanner.active { display: block; overflow-y: auto; height: calc(100vh - 56px); }
  #view-review.active  { display: flex;  height: calc(100vh - 56px); position: relative; }
  #review-loading-overlay {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 1000;
    background: rgba(19,21,31,0.92);
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    cursor: wait;
  }
  #review-loading-overlay.visible { display: flex; }
  .review-loading-message {
    background: #1a1d2a;
    border: 1px solid #3d4160;
    border-radius: 12px;
    padding: 24px 32px;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .review-loading-title {
    font-size: 16px;
    font-weight: 600;
    color: #e8eaed;
    margin-bottom: 8px;
  }
  .review-loading-detail {
    font-size: 14px;
    color: #a5f3c4;
    margin-bottom: 12px;
  }
  .review-loading-warn {
    font-size: 12px;
    color: #9aa0a6;
    line-height: 1.4;
  }

  /* ── Scanner View ── */
  .scanner-content {
    max-width: 700px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }
  .card {
    background: #161822;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #a5f3c4;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .folder-empty {
    color: #4a4a6a;
    font-size: 13px;
    padding: 12px 0;
  }
  .folder-item {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    background: #1a1d2a;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .folder-item .path {
    flex: 1;
    font-size: 13px;
    font-family: 'Consolas', 'Cascadia Code', 'Monaco', monospace;
    color: #c0c0d0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .folder-item .remove-btn {
    background: transparent;
    border: none;
    color: #6b6b8a;
    cursor: pointer;
    padding: 2px 8px;
    font-size: 20px;
    line-height: 1;
    font-family: inherit;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .folder-item .remove-btn:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }

  .add-folder-row { display: flex; gap: 8px; margin-top: 12px; }
  .add-folder-row input {
    flex: 1;
    padding: 9px 12px;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    background: #1a1d2a;
    color: #e0e0e0;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .add-folder-row input:focus { border-color: #a5f3c4; }
  .add-folder-row input::placeholder { color: #4a4a6a; }
  .add-folder-hint { font-size: 11px; color: #4a4a6a; margin-top: 8px; }
  .exclude-row { margin-top: 16px; }
  .exclude-row label {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: #6b6b8a; margin-bottom: 6px;
  }
  .exclude-row input {
    width: 100%; box-sizing: border-box;
    padding: 8px 12px;
    background: #0f1117; border: 1px solid #2a2d3a; border-radius: 6px;
    color: #c0c0d0; font-size: 13px; font-family: monospace; outline: none;
    transition: border-color 0.15s;
  }
  .exclude-row input:focus { border-color: #a5f3c4; }
  .exclude-row input::placeholder { color: #3a3d5a; }

  .settings-row { display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap; }
  .setting { display: flex; flex-direction: column; gap: 6px; }
  .setting.setting-disabled { opacity: 0.55; pointer-events: none; }
  .setting-hint { font-weight: normal; color: #6b6b8a; text-transform: none; }
  .setting label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #6b6b8a;
  }
  .setting select,
  .setting input[type="number"] {
    padding: 7px 10px;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
    background: #1a1d2a;
    color: #e0e0e0;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .setting select:focus,
  .setting input[type="number"]:focus { border-color: #a5f3c4; }

  .tip-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #2a2d3a;
    color: #8888aa;
    font-size: 11px;
    font-weight: 700;
    cursor: help;
    margin-left: 5px;
    vertical-align: middle;
    position: relative;
  }
  .tip-icon:hover { background: #3a3d5a; color: #c0c0d0; }
  .tip-icon .tip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    width: 290px;
    max-height: 40vh;
    overflow-y: auto;
    background: #1e2030;
    border: 1px solid #3a3d5a;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    font-weight: 400;
    color: #c0c0d0;
    line-height: 1.5;
    z-index: 50;
    text-transform: none;
    letter-spacing: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .tip-icon .tip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #3a3d5a;
  }
  .tip-icon.tip-open .tip { display: block; }
  .tip .pro { color: #a5f3c4; }
  .tip .con { color: #ff8888; }

  .progress-section { margin-bottom: 20px; }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: #2a2d3a;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #2a9d4e, #a5f3c4);
    border-radius: 3px;
    transition: width 0.5s ease;
    width: 0;
  }
  .progress-fill.indeterminate {
    width: 100% !important;
    background: repeating-linear-gradient(
      -45deg,
      #2a9d4e 0, #2a9d4e 10px,
      #3ab868 10px, #3ab868 20px
    );
    background-size: 28px 28px;
    animation: stripe-move 0.8s linear infinite;
  }
  @keyframes stripe-move {
    from { background-position: 0 0; }
    to   { background-position: 28px 0; }
  }
  .progress-stats {
    text-align: center;
    font-size: 13px;
    color: #8888aa;
    margin-bottom: 4px;
  }
  .progress-stats span { color: #a5f3c4; font-weight: 600; }
  .progress-file {
    text-align: center;
    font-size: 12px;
    color: #5a5a7a;
  }

  .scan-btn-row { text-align: center; }
  .scan-btn {
    padding: 12px 36px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    border: 1px solid;
  }
  .scan-btn.start {
    background: #1a3a1a;
    border-color: #2a6a2a;
    color: #a5f3c4;
  }
  .scan-btn.start:hover { background: #2a5a2a; }
  .scan-btn.stop {
    background: #3a1a1a;
    border-color: #6a2a2a;
    color: #ff8888;
  }
  .scan-btn.stop:hover { background: #5a2a2a; }
  .scan-btn.reset {
    background: #2a1a1a;
    border-color: #5a3a1a;
    color: #ffaa66;
    font-size: 0.8rem;
    padding: 6px 14px;
  }
  .scan-btn.reset:hover { background: #3a2a1a; }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .scan-btn.busy { animation: scan-btn-busy 0.8s ease-in-out infinite; }
  @keyframes scan-btn-busy {
    50% { opacity: 0.75; }
  }

  .scan-done {
    text-align: center;
    color: #a5f3c4;
    font-size: 14px;
    padding: 14px;
    background: #1a2e1a;
    border-radius: 8px;
    margin-top: 16px;
  }
  .scan-done a {
    color: #a5f3c4;
    text-decoration: underline;
    cursor: pointer;
  }
  .scan-error {
    text-align: center;
    color: #ff8888;
    font-size: 14px;
    padding: 14px;
    background: #2e1a1a;
    border-radius: 8px;
    margin-top: 16px;
    word-break: break-word;
  }

  /* ── Review View ── */
  .sidebar {
    width: 300px;
    border-right: 1px solid #2a2d3a;
    overflow-y: auto;
    background: #13151f;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 12px 16px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #6b6b8a;
    border-bottom: 1px solid #2a2d3a;
    position: sticky;
    top: 0;
    background: #13151f;
  }
  .sidebar-loading {
    padding: 8px 16px;
    font-size: 11px;
    color: #a5f3c4;
    background: #1a2a1a;
    border-bottom: 1px solid #2a2d3a;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.5; } }
  .sidebar-header { display: flex; justify-content: space-between; align-items: center; }
  .sidebar-actions { display: flex; gap: 8px; align-items: center; }
  .toggle-tree { font-size: 15px; line-height: 1; }
  .sidebar-action {
    font-size: 11px; color: #a5f3c4; cursor: pointer;
    text-transform: none; letter-spacing: 0;
  }
  .sidebar-action:hover { text-decoration: underline; }
  .group-header {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; cursor: pointer;
    background: #181b26; border-bottom: 1px solid #2a2d3a;
    font-size: 13px; font-weight: 600; color: #c0c0e0;
  }
  .group-header:hover { background: #1e2130; }
  .group-header.drag-over, .group-divider.drag-over, .cluster-item.drag-over {
    background: #1a2a1a; outline: 2px dashed #a5f3c4; outline-offset: -2px;
  }
  .group-arrow { font-size: 10px; color: #6b6b8a; width: 12px; }
  .group-name { flex: 1; }
  .group-count { font-size: 11px; color: #6b6b8a; font-weight: 400; }
  .group-actions { display: none; gap: 4px; }
  .group-header:hover .group-actions { display: flex; }
  .group-header:hover .group-count { display: none; }
  .group-action { font-size: 12px; color: #6b6b8a; cursor: pointer; padding: 0 2px; }
  .group-action:hover { color: #fff; }
  .ctx-menu {
    position: fixed; z-index: 1000;
    background: #1e2130; border: 1px solid #3a3d4a; border-radius: 6px;
    min-width: 180px; padding: 4px 0;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .ctx-title {
    padding: 6px 14px; font-size: 11px; color: #6b6b8a;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .ctx-item {
    padding: 7px 14px; font-size: 13px; cursor: pointer; color: #e0e0e0;
  }
  .ctx-item:hover { background: #2a2d3e; }
  .ctx-none { color: #6b6b8a; font-style: italic; }
  .ctx-new { color: #a5f3c4; }
  .ctx-divider { border-top: 1px solid #2a2d3a; margin: 4px 0; }
  .group-divider {
    padding: 8px 16px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 1px; color: #6b6b8a; border-top: 1px solid #2a2d3a;
    border-bottom: 1px solid #2a2d3a; background: #13151f;
  }
  .cluster-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 1px solid #1a1d2a;
    transition: background 0.15s;
  }
  .cluster-item:hover { background: #1c1f2e; }
  .cluster-item.active { background: #1e2a1e; border-left: 3px solid #a5f3c4; }
  .cluster-item .thumb-stack {
    width: 40px; height: 40px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: #2a2d3a;
  }
  .cluster-item .thumb-stack img { width: 100%; height: 100%; object-fit: cover; }
  .cluster-item .info { flex: 1; min-width: 0; }
  .cluster-item .name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cluster-item .name.unnamed { color: #6b6b8a; font-style: italic; }
  .cluster-item .count { font-size: 12px; color: #6b6b8a; }

  .main { flex: 1; overflow-y: auto; padding: 24px; }
  .main-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #4a4a6a;
    font-size: 16px;
  }

  .detail-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .detail-header .field { display: flex; flex-direction: column; gap: 4px; }
  .detail-header label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #6b6b8a;
  }
  .detail-header input {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #2a2d3a;
    background: #1a1d2a;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    font-family: inherit;
  }
  .detail-header input:focus { border-color: #a5f3c4; }
  .detail-header input[type="text"] { width: 220px; }
  .detail-header input[type="number"] { width: 90px; }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #2a2d3a;
    background: #1a1d2a;
    color: #e0e0e0;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn:hover { background: #252840; border-color: #a5f3c4; }
  .btn-save { background: #1a3a1a; border-color: #2a6a2a; }
  .btn-save:hover { background: #2a5a2a; }
  .btn-merge { background: #3a1a1a; border-color: #6a2a2a; margin-left: auto; }
  .btn-merge:hover { background: #5a2a2a; }

  .face-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  .face-card {
    background: #161822;
    border-radius: 10px;
    border: 1px solid #2a2d3a;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .face-card:hover { border-color: #a5f3c4; transform: translateY(-2px); }
  .face-card:active { transform: translateY(0); }
  .face-card.selected { border-color: #a5f3c4; box-shadow: 0 0 0 2px rgba(165,243,196,0.25); }
  .face-card .sel-check {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.45);
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1; cursor: pointer;
    opacity: 0; transition: opacity 0.12s;
    z-index: 2;
  }
  .face-card:hover .sel-check, .face-card.selected .sel-check { opacity: 1; }
  .face-card.selected .sel-check { background: #a5f3c4; border-color: #a5f3c4; color: #0f1117; }
  .face-select-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 0 12px; font-size: 13px; color: #a5f3c4;
  }
  .face-select-bar button {
    padding: 3px 10px; font-size: 12px; border-radius: 5px;
    border: 1px solid #3a3d4a; background: #1a1d2a; color: #c0c0d0; cursor: pointer;
  }
  .face-select-bar button:hover { background: #252840; }
  .face-card img {
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
    display: block;
    background: #2a2d3a;
  }
  .face-card .meta { padding: 8px 10px; }
  .face-card .date { font-size: 13px; font-weight: 600; color: #c0c0d0; }
  .face-card .age { font-size: 12px; color: #a5f3c4; margin-left: 6px; }
  .face-card .path {
    font-size: 10px;
    color: #5a5a7a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1e3a1e;
    border: 1px solid #2a6a2a;
    color: #a5f3c4;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Merge modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 150;
  }
  .modal {
    background: #1a1d2a;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 24px;
    width: 400px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h3 { margin-bottom: 12px; font-size: 16px; }
  .modal .merge-search {
    width: 100%; box-sizing: border-box;
    padding: 7px 12px; margin-bottom: 12px;
    background: #0f1117; border: 1px solid #2a2d3a; border-radius: 6px;
    color: #e8eaed; font-size: 14px; outline: none;
  }
  .modal .merge-search:focus { border-color: #5c6bc0; }
  .modal .merge-no-results { color: #6b6b8a; padding: 8px 12px; font-size: 14px; }
  .modal .merge-target {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .modal .merge-target:hover { background: #252840; }
  .modal .merge-target img {
    width: 32px; height: 32px;
    border-radius: 50%;
    object-fit: cover;
  }

  /* ── Folder picker modal ── */
  .folder-picker { width: 520px; display: flex; flex-direction: column; }
  .picker-path {
    padding: 8px 12px;
    background: #0f1117;
    border-radius: 6px;
    font-family: 'Consolas', 'Cascadia Code', 'Monaco', monospace;
    font-size: 13px;
    color: #a5f3c4;
    margin-bottom: 12px;
    word-break: break-all;
    min-height: 34px;
    display: flex;
    align-items: center;
  }
  .picker-list {
    overflow-y: auto;
    min-height: 200px;
    max-height: 400px;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .picker-item {
    padding: 9px 14px;
    cursor: pointer;
    font-size: 13px;
    border-bottom: 1px solid #1a1d2a;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .picker-item:hover { background: #1c1f2e; }
  .picker-item:last-child { border-bottom: none; }
  .picker-item .folder-icon {
    color: #6b6b8a;
    font-size: 15px;
    flex-shrink: 0;
  }
  .picker-item.parent-dir { color: #8888aa; }
  .picker-empty {
    padding: 32px;
    text-align: center;
    color: #4a4a6a;
    font-size: 13px;
  }
  .picker-loading {
    padding: 32px;
    text-align: center;
    color: #6b6b8a;
    font-size: 13px;
  }
  .picker-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>gedface</h1>
  <nav class="tabs">
    <button class="tab active" data-tab="scanner" onclick="switchTab('scanner')">Scanner</button>
    <button class="tab" data-tab="review" onclick="switchTab('review')">Review</button>
  </nav>
  <div class="stats" id="stats"></div>
</header>

<!-- ── Scanner View ── -->
<div id="view-scanner" class="view active">
  <div class="scanner-content">
    <div class="card">
      <div class="card-title">Scan Folders</div>
      <div id="folder-list"></div>
      <div class="add-folder-row">
        <input type="text" id="folder-input"
               placeholder="Paste a path and press Enter"
               onkeydown="if(event.key==='Enter')addFolder()">
        <button class="btn" onclick="openFolderPicker()">Browse...</button>
      </div>
      <div class="add-folder-hint">All subfolders will be scanned recursively for photos.</div>
      <div class="exclude-row">
        <label>
          Exclude folders
          <span class="tip-icon">?<span class="tip">
            Comma-separated list of folder-name patterns to skip during scan.<br><br>
            Each pattern is matched against <b>folder names</b> (not full paths) using glob rules (case-insensitive):<br>
            &nbsp;<b>*</b> matches any characters &nbsp;&nbsp;<b>?</b> matches one character<br><br>
            <b>Examples:</b><br>
            <code>@eaDir</code> — Synology thumbnail cache<br>
            <code>*thumb*, face_data</code> — any folder containing "thumb", or named "face_data"<br>
            <code>.*, #recycle</code> — hidden folders and Synology recycle bin<br><br>
            On <b>Scan for New</b>, photos already in the database whose path contains a matching folder component are also <b>removed</b> from the database.
          </span></span>
        </label>
        <input type="text" id="exclude-input"
               placeholder="e.g. @eaDir, *thumb*, face_data, #recycle"
               oninput="scheduleExcludeSave()">
      </div>
    </div>

    <div class="card">
      <div class="card-title">Scan Settings</div>
      <div class="settings-row">
        <div class="setting">
          <label>Backend
            <span class="tip-icon">?<span class="tip">
              <b>CPU (InsightFace):</b> Current pipeline. Use this to resume or review existing scan.<br><br>
              <b>GPU Iris Xe (OpenVINO):</b> Experimental — uses Intel GPU. Separate DB; switch back to CPU to restore previous state.
            </span></span>
          </label>
          <select id="backend" onchange="switchBackend()">
            <option value="cpu">CPU (InsightFace)</option>
            <option value="openvino">GPU Iris Xe (OpenVINO)</option>
          </select>
        </div>
        <div class="setting" id="setting-det-size">
          <label>Detection size <span id="det-size-hint" class="setting-hint"></span>
            <span class="tip-icon">?<span class="tip">
              Resolution the model uses to find faces in each photo.<br><br>
              <b>Higher (640):</b><br>
              <span class="pro">+</span> Finds small and distant faces<br>
              <span class="pro">+</span> Better for group / crowd photos<br>
              <span class="con">&minus;</span> ~3&times; slower per image<br>
              <span class="con">&minus;</span> Higher RAM usage<br><br>
              <b>Lower (320):</b><br>
              <span class="pro">+</span> Much faster processing<br>
              <span class="con">&minus;</span> May miss small faces in the background
            </span></span>
          </label>
          <select id="det-size">
            <option value="320" selected>320 — fast</option>
            <option value="640">640 — accurate (group photos)</option>
          </select>
        </div>
        <div class="setting">
          <label>Clustering threshold
            <span class="tip-icon">?<span class="tip">
              How similar two faces must be to be grouped as the same person. Range 0.1–0.8.<br><br>
              <b>Higher (e.g. 0.50):</b><br>
              <span class="pro">+</span> Fewer wrong matches<br>
              <span class="con">&minus;</span> Same person may split into multiple clusters<br>
              <span class="con">&minus;</span> More manual merging needed<br><br>
              <b>Lower (e.g. 0.25):</b><br>
              <span class="pro">+</span> Catches the same person across ages/angles<br>
              <span class="con">&minus;</span> Different people may end up in one cluster<br><br>
              Default <b>0.35</b> is a good starting point.
            </span></span>
          </label>
          <input type="number" id="threshold" value="0.35" step="0.05" min="0.10" max="0.80">
        </div>
        <div class="setting">
          <label>CPU limit
            <span class="tip-icon">?<span class="tip">
              Percentage of CPU cores the scan is allowed to use.<br><br>
              <b>Lower (e.g. 30%):</b><br>
              <span class="pro">+</span> Laptop stays responsive for other work<br>
              <span class="con">&minus;</span> Scan takes much longer<br><br>
              <b>Higher (e.g. 100%):</b><br>
              <span class="pro">+</span> Fastest possible scan<br>
              <span class="con">&minus;</span> Machine may feel sluggish<br><br>
              Default <b>60%</b> is a good balance.
            </span></span>
          </label>
          <select id="cpu-percent" onchange="applyCpuLimit()">
            <option value="30">30%</option>
            <option value="50">50%</option>
            <option value="60" selected>60%</option>
            <option value="80">80%</option>
            <option value="100">100%</option>
          </select>
        </div>
      </div>

      <div id="progress-section" class="progress-section" style="display:none">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="progress-stats" class="progress-stats"></div>
        <div id="progress-timing" class="progress-stats" style="margin-top:2px"></div>
        <div id="progress-file" class="progress-file"></div>
      </div>

      <div class="scan-btn-row">
        <button id="scan-btn" class="scan-btn start" onclick="startScan()">Start Scan</button>
        <button id="reset-btn" class="scan-btn reset" onclick="resetDatabase()">Reset DB</button>
      </div>
      <div id="scan-message"></div>
    </div>
  </div>
</div>

<!-- ── Review View ── -->
<div id="view-review" class="view">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Clusters</div>
  </div>
  <div class="main" id="main">
    <div class="main-empty">Select a cluster from the sidebar</div>
  </div>
  <div id="review-loading-overlay" aria-live="polite"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// Tab management
// ═══════════════════════════════════════════════════════════════════════════

let currentTab = 'scanner';
let clustersLoaded = false;
let reviewNeedsRefresh = false;
let _lastScanStatus = 'idle';
let _cachedOrphanCount = 0;  // updated by updateScanBtnState(), reused by startScan()

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');

  if (tab === 'review') {
    document.querySelector('[data-tab="review"]').classList.remove('has-update');
    const scanActive = ['loading_model', 'scanning', 'clustering'].includes(_lastScanStatus);
    if (!clustersLoaded || reviewNeedsRefresh || scanActive) {
      reviewNeedsRefresh = false;
      clusterFaces = {};
      firstThumb = {};
      loadClusters();
      loadStats();
    }
  }
  if (tab === 'scanner') {
    loadFolders();
  }
}

// ─── Tooltip click-to-toggle ────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  const icon = e.target.closest('.tip-icon');
  if (icon) {
    const wasOpen = icon.classList.contains('tip-open');
    document.querySelectorAll('.tip-icon.tip-open').forEach(el => el.classList.remove('tip-open'));
    if (!wasOpen) icon.classList.add('tip-open');
    e.stopPropagation();
  } else {
    document.querySelectorAll('.tip-icon.tip-open').forEach(el => el.classList.remove('tip-open'));
  }
});

// ═══════════════════════════════════════════════════════════════════════════
// Shared helpers
// ═══════════════════════════════════════════════════════════════════════════

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escJs(s) { return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const s = await r.json();
    document.getElementById('stats').innerHTML =
      `Photos: <span>${s.photos.toLocaleString()}</span> · ` +
      `Faces: <span>${s.faces.toLocaleString()}</span> · ` +
      `Clusters: <span>${s.clusters}</span> · ` +
      `Named: <span>${s.named}</span>`;
  } catch (e) {}
}

function formatDuration(seconds) {
  if (!seconds || seconds <= 0) return '\u2014';
  if (seconds < 60) return seconds + 's';
  if (seconds < 3600) return Math.round(seconds / 60) + ' min';
  const h = Math.floor(seconds / 3600);
  const m = Math.round((seconds % 3600) / 60);
  return h + 'h ' + m + 'm';
}
function formatEta(seconds) { return formatDuration(seconds); }

// ═══════════════════════════════════════════════════════════════════════════
// Scanner — folder management
// ═══════════════════════════════════════════════════════════════════════════

let folders = [];

async function loadFolders() {
  const [foldersRes, settingsRes] = await Promise.all([
    fetch('/api/scan/folders'),
    fetch('/api/scan/settings'),
  ]);
  folders = await foldersRes.json();
  const settings = await settingsRes.json();
  const el = document.getElementById('exclude-input');
  if (el) el.value = settings.exclude_patterns || '';
  renderFolders();
  updateScanBtnState();
}

let _excludeSaveTimer = null;
function scheduleExcludeSave() {
  clearTimeout(_excludeSaveTimer);
  _excludeSaveTimer = setTimeout(saveExcludePatterns, 800);
}

async function saveExcludePatterns() {
  const val = document.getElementById('exclude-input')?.value ?? '';
  await fetch('/api/scan/settings', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({exclude_patterns: val}),
  });
}

function renderFolders() {
  const el = document.getElementById('folder-list');
  if (folders.length === 0) {
    el.innerHTML = '<div class="folder-empty">No folders added yet</div>';
    return;
  }
  el.innerHTML = folders.map(f => `
    <div class="folder-item">
      <div class="path" title="${esc(f.folder_path)}">${esc(f.folder_path)}</div>
      <button class="remove-btn" onclick="removeFolder(${f.id})" title="Remove">&times;</button>
    </div>`).join('');
}

async function addFolder() {
  const input = document.getElementById('folder-input');
  const path = input.value.trim();
  if (!path) return;

  const r = await fetch('/api/scan/folders', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({folder_path: path}),
  });
  const data = await r.json();
  if (!r.ok) {
    showToast(data.error || 'Failed to add folder');
    return;
  }
  input.value = '';
  input.focus();
  await loadFolders();
  showToast('Folder added');
}

async function removeFolder(id) {
  await fetch(`/api/scan/folders/${id}`, {method: 'DELETE'});
  await loadFolders();
}

// ═══════════════════════════════════════════════════════════════════════════
// Scanner — folder picker
// ═══════════════════════════════════════════════════════════════════════════

let pickerCurrentPath = '';

function openFolderPicker() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal folder-picker">
      <h3>Select Folder</h3>
      <div class="picker-path" id="picker-path"></div>
      <div class="picker-list" id="picker-list">
        <div class="picker-loading">Loading...</div>
      </div>
      <div class="picker-actions">
        <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-save" id="picker-select" onclick="selectPickerFolder()" disabled>Select this folder</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  navigatePicker('');
}

async function navigatePicker(path) {
  const listEl = document.getElementById('picker-list');
  listEl.innerHTML = '<div class="picker-loading">Loading...</div>';

  const r = await fetch('/api/browse?path=' + encodeURIComponent(path));
  const data = await r.json();
  if (!r.ok) {
    listEl.innerHTML = `<div class="picker-empty">${esc(data.error || 'Cannot open')}</div>`;
    return;
  }

  pickerCurrentPath = data.current;
  document.getElementById('picker-path').textContent = data.current || 'This PC';
  document.getElementById('picker-select').disabled = !data.current;

  let html = '';
  if (data.parent !== undefined && data.parent !== null) {
    html += `<div class="picker-item parent-dir" onclick="navigatePicker('${escJs(data.parent)}')">
      <span class="folder-icon">\u{1F4C1}</span> ..</div>`;
  } else if (data.current) {
    html += `<div class="picker-item parent-dir" onclick="navigatePicker('')">
      <span class="folder-icon">\u{1F4BB}</span> This PC</div>`;
  }

  for (const d of data.dirs) {
    html += `<div class="picker-item" onclick="navigatePicker('${escJs(d.path)}')" title="${esc(d.path)}">
      <span class="folder-icon">\u{1F4C1}</span> ${esc(d.name)}</div>`;
  }

  if (!html) {
    html = '<div class="picker-empty">No subfolders</div>';
  }
  listEl.innerHTML = html;
}

async function selectPickerFolder() {
  if (!pickerCurrentPath) return;
  const r = await fetch('/api/scan/folders', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({folder_path: pickerCurrentPath}),
  });
  const data = await r.json();
  document.querySelector('.modal-overlay')?.remove();
  if (!r.ok) {
    showToast(data.error || 'Failed to add folder');
    return;
  }
  await loadFolders();
  showToast('Folder added');
}

// ═══════════════════════════════════════════════════════════════════════════
// Scanner — scan control & progress
// ═══════════════════════════════════════════════════════════════════════════

let scanEventSource = null;

function updateSettingsForBackend() {
  const backend = (document.getElementById('backend') || {}).value || 'cpu';
  const detSizeBlock = document.getElementById('setting-det-size');
  const hint = document.getElementById('det-size-hint');
  const detSizeSelect = document.getElementById('det-size');
  if (!detSizeBlock) return;
  if (backend === 'openvino') {
    detSizeBlock.classList.add('setting-disabled');
    if (hint) hint.textContent = '(CPU only)';
    if (detSizeSelect) detSizeSelect.disabled = true;
  } else {
    detSizeBlock.classList.remove('setting-disabled');
    if (hint) hint.textContent = '';
    if (detSizeSelect) detSizeSelect.disabled = false;
  }
}

async function loadBackend() {
  const r = await fetch('/api/backend');
  const data = await r.json();
  const el = document.getElementById('backend');
  if (el && data.backend) el.value = data.backend;
  updateSettingsForBackend();
}

async function switchBackend() {
  const el = document.getElementById('backend');
  const backend = el?.value || 'cpu';
  const r = await fetch('/api/backend', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({backend}),
  });
  const data = await r.json();
  if (!r.ok) {
    const msg = data.detail || data.error || 'Failed to switch backend';
    if (data.detail) alert(msg);
    else showToast(msg);
    loadBackend();
    return;
  }
  showToast(backend === 'openvino' ? 'Using GPU Iris Xe (OpenVINO)' : 'Using CPU (InsightFace)');
  updateSettingsForBackend();
  reviewNeedsRefresh = true;
  clustersLoaded = false;
  await loadStats();
  await updateScanBtnState();
  updateScanUI(await (await fetch('/api/scan/status')).json());
}

function connectSSE() {
  if (scanEventSource) return;
  scanEventSource = new EventSource('/api/scan/progress');
  scanEventSource.onmessage = (e) => {
    const data = JSON.parse(e.data);
    updateScanUI(data);
  };
  scanEventSource.onerror = () => {
    // EventSource auto-reconnects; nothing to do
  };
}

function showScanStarting() {
  // Immediate feedback the moment user clicks — no wait for server or model load
  const progress = document.getElementById('progress-section');
  const fill = document.getElementById('progress-fill');
  const statsEl = document.getElementById('progress-stats');
  const timingEl = document.getElementById('progress-timing');
  const fileEl = document.getElementById('progress-file');
  const btn = document.getElementById('scan-btn');
  const msgEl = document.getElementById('scan-message');
  progress.style.display = 'block';
  fill.className = 'progress-fill indeterminate';
  fill.style.width = '';
  statsEl.textContent = '';
  timingEl.textContent = '';
  fileEl.textContent = 'Starting scan…';
  btn.textContent = 'Starting…';
  btn.className = 'scan-btn start';
  btn.disabled = true;
  msgEl.innerHTML = '';
}

function showOrphanChoiceModal(orphanCount) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); resolve(false); } };
    overlay.innerHTML = `
      <div class="modal" onclick="event.stopPropagation()">
        <h3>Orphan photos in database</h3>
        <p style="color:#9aa0a6;margin-bottom:16px;font-size:14px">The database contains ${orphanCount} photo(s) from folders not in your current scan list (e.g. a previous test scan).</p>
        <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
          <button class="btn" id="orphan-keep-btn">Keep data and start scan</button>
          <button class="btn" style="background:#6b2a2a;color:#fff" id="orphan-reset-btn">Reset database then start scan</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const done = (value) => { overlay.remove(); resolve(value); };
    overlay.querySelector('#orphan-keep-btn').onclick = () => done(false);
    overlay.querySelector('#orphan-reset-btn').onclick = () => done(true);
    overlay.onclick = (e) => { if (e.target === overlay) done(false); };
  });
}

async function startScan() {
  showScanStarting();  // Immediate feedback — disable button before any async work

  const backendEl = document.getElementById('backend');
  const backend = backendEl?.value || 'cpu';
  if (backend === 'openvino') {
    const readyR = await fetch('/api/openvino/ready');
    const readyData = await readyR.json();
    if (!readyData.ready) {
      alert(readyData.message || 'GPU Iris Xe (OpenVINO) backend is not ready.');
      updateScanUI({ status: 'idle' });
      return;
    }
  }

  const detSize = document.getElementById('det-size').value;
  const threshold = document.getElementById('threshold').value;
  const cpuPercent = document.getElementById('cpu-percent').value;

  if (_cachedOrphanCount > 0) {
    const orphan = _cachedOrphanCount;
    const resetFirst = await showOrphanChoiceModal(orphan);
    if (resetFirst) {
      const resetR = await fetch('/api/scan/reset', {method: 'POST'});
      if (!resetR.ok) { showToast('Reset failed'); updateScanUI({ status: 'idle' }); return; }
      showToast('Old data cleared.');
    }
  }
  const r = await fetch('/api/scan/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({det_size: parseInt(detSize), threshold: parseFloat(threshold), cpu_percent: parseInt(cpuPercent)}),
  });
  const data = await r.json();
  if (!r.ok) {
    if (data.detail) alert(data.detail);
    else showToast(data.error || 'Failed to start');
    updateScanUI({ status: 'idle' });
    return;
  }
  connectSSE();
}

async function stopScan() {
  const btn = document.getElementById('scan-btn');
  btn.textContent = 'Stopping…';
  btn.disabled = true;
  btn.classList.add('busy');
  try {
    await fetch('/api/scan/stop', {method: 'POST'});
    // Don't immediately re-poll status here: the thread may still be alive
    // (processing the current image) and a re-poll would show 'scanning' again,
    // making it look like nothing happened. SSE will push the actual state change.
    // Fallback: if SSE doesn't deliver an update within 8 s, poll manually.
    setTimeout(async () => {
      if (btn.textContent === 'Stopping…') {
        btn.classList.remove('busy');
        try {
          const statusR = await fetch('/api/scan/status');
          updateScanUI(await statusR.json());
        } catch (_) {}
      }
    }, 8000);
  } catch (_) {
    // Network error — poll immediately so button doesn't stay stuck.
    btn.classList.remove('busy');
    try {
      const statusR = await fetch('/api/scan/status');
      updateScanUI(await statusR.json());
    } catch (_2) {
      btn.textContent = 'Pause Scan';
      btn.disabled = false;
    }
  }
}

async function applyCpuLimit() {
  const v = document.getElementById('cpu-percent').value;
  await fetch('/api/scan/cpu', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cpu_percent: parseInt(v)}),
  });
  showToast(`CPU limit set to ${v}%`);
}

function resetDatabase() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-reset-db';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Reset database?</h3>
      <p style="color:#9aa0a6;margin-bottom:16px;font-size:14px">This will delete ALL scan data (photos, faces, clusters, thumbnails) so the next scan starts completely from scratch.</p>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn" style="background:#6b2a2a;color:#fff" onclick="confirmResetDatabase()">Reset database</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function confirmResetDatabase() {
  const overlay = document.getElementById('modal-reset-db');
  if (overlay) overlay.remove();
  const r = await fetch('/api/scan/reset', {method: 'POST'});
  const data = await r.json();
  if (!r.ok) {
    showToast(data.error || 'Reset failed');
    return;
  }
  showToast('Database reset. Ready for a fresh scan.');
  clusters = [];
  groups = [];
  clusterFaces = {};
  firstThumb = {};
  clustersLoaded = false;
  activeCluster = null;
  renderSidebar();
  document.getElementById('main').innerHTML = '<div class="main-empty">Select a cluster from the sidebar</div>';
  const btn = document.getElementById('scan-btn');
  btn.textContent = 'Start Scan';
  btn.className = 'scan-btn start';
  btn.onclick = startScan;
  document.getElementById('progress-section').style.display = 'none';
  document.getElementById('scan-message').innerHTML = '';
  await loadStats();
  await updateScanBtnState();
  btn.disabled = folders.length === 0;
}

async function updateScanBtnState() {
  const btn = document.getElementById('scan-btn');
  if (!btn.classList.contains('start')) return;
  btn.disabled = folders.length === 0;
  if (folders.length === 0) { btn.textContent = 'Start Scan'; return; }

  const statsR = await fetch('/api/stats');
  const stats = await statsR.json();
  btn.textContent = stats.photos === 0 ? 'Start Scan' : 'Scan for New';
}

function updateScanUI(s) {
  const btn = document.getElementById('scan-btn');
  btn.classList.remove('busy');  // clear any in-progress stop animation
  const resetBtn = document.getElementById('reset-btn');
  const progress = document.getElementById('progress-section');
  const fill = document.getElementById('progress-fill');
  const statsEl = document.getElementById('progress-stats');
  const fileEl = document.getElementById('progress-file');
  const msgEl = document.getElementById('scan-message');

  const timingEl = document.getElementById('progress-timing');
  const scanning = ['loading_model', 'scanning', 'clustering'].includes(s.status);
  resetBtn.disabled = scanning;
  _lastScanStatus = s.status;

  if (s.status === 'idle') {
    progress.style.display = 'none';
    btn.className = 'scan-btn start';
    btn.onclick = startScan;
    btn.disabled = folders.length === 0;
    msgEl.innerHTML = '';
    updateScanBtnState();
  } else if (s.status === 'loading_model') {
    progress.style.display = 'block';
    fill.className = 'progress-fill indeterminate';
    statsEl.textContent = '';
    timingEl.textContent = '';
    fileEl.textContent = s.message;
    btn.textContent = 'Loading model...';
    btn.className = 'scan-btn start';
    btn.disabled = true;
    msgEl.innerHTML = '';
  } else if (s.status === 'scanning') {
    progress.style.display = 'block';
    const pct = s.total > 0 ? ((s.current / s.total) * 100).toFixed(1) : 0;
    fill.className = s.total > 0 ? 'progress-fill' : 'progress-fill indeterminate';
    fill.style.width = s.total > 0 ? pct + '%' : '';
    statsEl.innerHTML = s.total > 0
      ? `<span>${s.current}</span> / ${s.total} photos &middot; ` +
        `<span>${s.faces_found}</span> faces &middot; ` +
        `<span>${s.errors}</span> errors`
      : esc(s.message || 'Checking…');
    timingEl.innerHTML = s.total > 0
      ? `Elapsed: <span>${formatDuration(s.elapsed_seconds)}</span> &middot; ` +
        `${s.sec_per_img}s/img &middot; ` +
        `last: ${s.photo_seconds}s &middot; ` +
        `ETA: <span>${formatEta(s.eta_seconds)}</span>` +
        (s.started_at ? ` &middot; started ${s.started_at.replace('T', ' ')}` : '')
      : '';
    fileEl.textContent = s.total > 0 ? s.current_file : '';
    btn.textContent = 'Pause Scan';
    btn.className = 'scan-btn stop';
    btn.onclick = stopScan;
    btn.disabled = false;
    msgEl.innerHTML = '';
  } else if (s.status === 'clustering') {
    progress.style.display = 'block';
    fill.className = 'progress-fill indeterminate';
    statsEl.textContent = '';
    timingEl.textContent = '';
    fileEl.textContent = s.message;
    btn.textContent = 'Clustering...';
    btn.className = 'scan-btn start';
    btn.disabled = true;
    msgEl.innerHTML = '';
  } else if (s.status === 'done') {
    progress.style.display = 'block';
    fill.className = 'progress-fill';
    fill.style.width = '100%';
    statsEl.textContent = '';
    timingEl.textContent = s.elapsed_seconds ? `Total time: ${formatDuration(s.elapsed_seconds)}` : '';
    fileEl.textContent = '';
    msgEl.innerHTML =
      `<div class="scan-done">${esc(s.message)}<br>` +
      `<a onclick="switchTab('review')">Go to Review &rarr;</a></div>`;
    btn.className = 'scan-btn start';
    btn.onclick = startScan;
    btn.disabled = folders.length === 0;
    const remaining = (s.total || 0) - (s.current || 0);
    btn.textContent = remaining > 0 ? `Resume Scan (${remaining} left)` : 'Scan for New';
    _cachedOrphanCount = 0;  // scan just ran — no new orphans
    loadStats();
    reviewNeedsRefresh = true;
    document.querySelector('[data-tab="review"]').classList.add('has-update');
  } else if (s.status === 'error') {
    progress.style.display = 'block';
    fill.className = 'progress-fill';
    fill.style.width = '0';
    statsEl.textContent = '';
    timingEl.textContent = '';
    fileEl.textContent = '';
    msgEl.innerHTML = `<div class="scan-error">${esc(s.message)}</div>`;
    btn.textContent = 'Retry';
    btn.className = 'scan-btn start';
    btn.onclick = startScan;
    btn.disabled = folders.length === 0;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// Review — cluster list & detail
// ═══════════════════════════════════════════════════════════════════════════

let clusters = [];
let groups = [];
let activeCluster = null;
let clusterFaces = {};
let firstThumb = {};
let detailThumbCache = {};  // thumb_path -> data URL for current detail pane
let collapsedGroups = new Set();

let _thumbsLoading = false;
let _thumbsProgress = '';

let selectedFaces = new Set();   // Set of face IDs currently selected in detail pane
let _lastSelectedIdx = -1;       // index of last toggled card, for Shift+click range

async function loadGroups() {
  const r = await fetch('/api/groups');
  groups = await r.json();
}

async function loadClusters() {
  _thumbsLoading = true;
  _thumbsProgress = 'Loading clusters…';
  updateReviewLoadingOverlay();
  try {
    const [cr, gr] = await Promise.all([fetch('/api/clusters'), fetch('/api/groups')]);
    clusters = await cr.json();
    groups = await gr.json();
    if (!clustersLoaded) groups.forEach(g => collapsedGroups.add(g.id));
    clustersLoaded = true;
    // Re-bind activeCluster to the current clusters array so we never use a stale reference
    if (activeCluster) {
      activeCluster = clusters.find(c => c.id === activeCluster.id) || null;
    }

    if (clusters.length === 0) {
      activeCluster = null;
      document.getElementById('main').innerHTML = '<div class="main-empty">Select a cluster from the sidebar</div>';
      return;
    }

    const toLoad = clusters.filter(c => c.face_count > 0 && !firstThumb[c.id]);
    if (toLoad.length > 0) {
      const ids = toLoad.map(c => c.id);
      const BATCH = 200;
      const pathByCid = {};
      for (let i = 0; i < ids.length; i += BATCH) {
        const loaded = Math.min(i + BATCH, ids.length);
        _thumbsProgress = `Loading thumbnails… ${loaded} / ${ids.length}`;
        updateReviewLoadingOverlay();
        const chunk = ids.slice(i, i + BATCH);
        const r = await fetch('/api/clusters/first-faces', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cluster_ids: chunk }),
        });
        Object.assign(pathByCid, await r.json());
      }
      const paths = Object.values(pathByCid).filter(Boolean);
      if (paths.length > 0) {
        _thumbsProgress = `Fetching ${paths.length} thumbnails…`;
        updateReviewLoadingOverlay();
        const tr = await fetch('/api/thumbs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paths }),
        });
        const base64ByPath = await tr.json();
        for (const [cid, thumbPath] of Object.entries(pathByCid)) {
          if (!thumbPath) continue;
          const b64 = base64ByPath[thumbPath];
          firstThumb[parseInt(cid, 10)] = b64
            ? `data:image/jpeg;base64,${b64}`
            : `/thumbs/${thumbPath}`;
        }
      } else {
        for (const [cid, thumbPath] of Object.entries(pathByCid)) {
          if (thumbPath) firstThumb[parseInt(cid, 10)] = `/thumbs/${thumbPath}`;
        }
      }


    }
  } finally {
    _thumbsLoading = false;
    _thumbsProgress = '';
    updateReviewLoadingOverlay();
    renderSidebar();
  }
}

function updateReviewLoadingOverlay() {
  const el = document.getElementById('review-loading-overlay');
  if (!el) return;
  if (_thumbsLoading) {
    const detail = _thumbsProgress || 'Loading thumbnails…';
    // If the structure is already rendered, only update the detail text to
    // avoid rebuilding the DOM (prevents flicker during rapid counter updates).
    const existing = el.querySelector('.review-loading-detail');
    if (existing) {
      existing.textContent = detail;
    } else {
      el.innerHTML = `
        <div class="review-loading-message">
          <div class="review-loading-title">Please wait</div>
          <div class="review-loading-detail">${esc(detail)}</div>
          <div class="review-loading-warn">Moving photos and other actions are disabled until loading finishes.</div>
        </div>`;
    }
    el.classList.add('visible');
  } else {
    el.classList.remove('visible');
    el.innerHTML = '';
  }
}

function sortClusters(list) {
  return [...list].sort((a, b) => {
    if (a.name && !b.name) return -1;
    if (!a.name && b.name) return 1;
    if (a.name && b.name) return a.name.localeCompare(b.name);
    return b.face_count - a.face_count;
  });
}

function clusterItemHtml(c) {
  const isActive = activeCluster && activeCluster.id === c.id;
  const name = c.name || 'Unnamed';
  const nameClass = c.name ? 'name' : 'name unnamed';
  const thumb = firstThumb[c.id] || '';
  return `
    <div class="cluster-item ${isActive ? 'active' : ''}"
         onclick="selectCluster(${c.id})"
         oncontextmenu="event.preventDefault();showClusterContextMenu(event,${c.id})"
         draggable="true"
         ondragstart="event.dataTransfer.setData('text/plain','${c.id}')"
         ondragover="clusterItemDragover(event)"
         ondragleave="event.currentTarget.classList.remove('drag-over')"
         ondrop="event.preventDefault();event.stopPropagation();event.currentTarget.classList.remove('drag-over');dropFaceOnCluster(event,${c.id})">
      <div class="thumb-stack">
        ${thumb ? `<img src="${thumb}" alt="">` : ''}
      </div>
      <div class="info">
        <div class="${nameClass}">${esc(name)}</div>
        <div class="count">${c.face_count} photo${c.face_count !== 1 ? 's' : ''}${c.birth_year ? ' \u00b7 b.' + c.birth_year : ''}</div>
      </div>
    </div>`;
}

function startFaceDrag(ev, faceId) {
  if (_thumbsLoading) {
    ev.preventDefault();
    return;
  }
  if (selectedFaces.size > 1 && selectedFaces.has(faceId)) {
    ev.dataTransfer.setData('text/plain', 'face-multi:' + [...selectedFaces].join(','));
  } else {
    ev.dataTransfer.setData('text/plain', 'face:' + faceId);
  }
  ev.dataTransfer.effectAllowed = 'move';
}

function clusterItemDragover(e) {
  if (_thumbsLoading) return;
  // Browsers often don't expose getData() until drop, so allow drop on cluster rows
  // and validate in dropFaceOnCluster (face:... vs cluster id).
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

async function dropFaceOnCluster(e, targetClusterId) {
  if (_thumbsLoading) return;
  const data = e.dataTransfer.getData('text/plain');
  if (!data) return;
  if (!activeCluster || targetClusterId === activeCluster.id) return;

  let faceIds = [];
  if (data.startsWith('face-multi:')) {
    faceIds = data.slice(11).split(',').map(Number).filter(n => !isNaN(n));
  } else if (data.startsWith('face:')) {
    const id = parseInt(data.slice(5), 10);
    if (!isNaN(id)) faceIds = [id];
  } else {
    return; // cluster drag, ignore
  }
  if (faceIds.length === 0) return;

  const results = await Promise.all(faceIds.map(faceId =>
    fetch(`/api/faces/${faceId}/move`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({cluster_id: targetClusterId}),
    })
  ));
  if (results.some(r => !r.ok)) { showToast('Some moves failed'); return; }

  selectedFaces.clear();
  _lastSelectedIdx = -1;
  delete clusterFaces[activeCluster.id];
  delete clusterFaces[targetClusterId];
  delete firstThumb[activeCluster.id];
  delete firstThumb[targetClusterId];
  await loadClusters();
  renderSidebar();
  await selectCluster(activeCluster.id);
  showToast(faceIds.length === 1 ? 'Photo moved to cluster' : `${faceIds.length} photos moved`);
}

function showClusterContextMenu(e, clusterId) {
  closeContextMenu();
  const menu = document.createElement('div');
  menu.className = 'ctx-menu';
  menu.id = 'ctx-menu';

  let html = `<div class="ctx-item" onclick="renameClusterFromMenu(${clusterId})">Rename...</div>`;
  html += `<div class="ctx-item" onclick="clearClusterName(${clusterId})">Clear name</div>`;
  html += '<div class="ctx-divider"></div>';
  html += '<div class="ctx-title">Move to group</div>';
  for (const g of groups) {
    html += `<div class="ctx-item" onclick="moveToGroup(${clusterId},${g.id})">${esc(g.name)}</div>`;
  }
  html += `<div class="ctx-item ctx-none" onclick="moveToGroup(${clusterId},null)">— Remove from group —</div>`;
  html += `<div class="ctx-divider"></div>`;
  html += `<div class="ctx-item ctx-new" onclick="moveToNewGroup(${clusterId})">+ New group...</div>`;

  menu.innerHTML = html;
  document.body.appendChild(menu);

  const x = Math.min(e.clientX, window.innerWidth - 200);
  const y = Math.min(e.clientY, window.innerHeight - menu.offsetHeight - 10);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';

  setTimeout(() => document.addEventListener('click', closeContextMenu, {once: true}), 0);
}

async function clearClusterName(clusterId) {
  closeContextMenu();
  await fetch(`/api/clusters/${clusterId}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name: null}),
  });
  const c = clusters.find(c => c.id === clusterId);
  if (c) c.name = null;
  if (activeCluster && activeCluster.id === clusterId) activeCluster.name = null;
  renderSidebar();
  if (activeCluster && activeCluster.id === clusterId) renderDetail();
}

function renameClusterFromMenu(clusterId) {
  closeContextMenu();
  const c = clusters.find(c => c.id === clusterId);
  const currentName = (c && c.name) || '';
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.dataset.clusterId = String(clusterId);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Rename cluster</h3>
      <input type="text" id="rename-cluster-input" value="${esc(currentName)}" placeholder="Enter name..."
             style="width:100%;padding:8px 12px;margin-bottom:16px;background:#0f1117;border:1px solid #2a2d3a;border-radius:6px;color:#e8eaed;font-size:14px">
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-save" onclick="confirmRenameCluster()">OK</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const input = document.getElementById('rename-cluster-input');
  input.focus();
  input.select();
  input.onkeydown = (e) => {
    if (e.key === 'Enter') confirmRenameCluster();
    if (e.key === 'Escape') overlay.remove();
  };
}

async function confirmRenameCluster() {
  const overlay = document.querySelector('.modal-overlay[data-cluster-id]');
  if (!overlay) return;
  const clusterId = parseInt(overlay.dataset.clusterId, 10);
  const input = document.getElementById('rename-cluster-input');
  const name = input ? input.value.trim() : '';
  overlay.remove();
  await fetch(`/api/clusters/${clusterId}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name: name || null}),
  });
  const c = clusters.find(c => c.id === clusterId);
  if (c) c.name = name || null;
  if (activeCluster && activeCluster.id === clusterId) activeCluster.name = name || null;
  renderSidebar();
  if (activeCluster && activeCluster.id === clusterId) renderDetail();
}

function showFaceContextMenu(e, faceId) {
  closeContextMenu();
  const menu = document.createElement('div');
  menu.className = 'ctx-menu';
  menu.id = 'ctx-menu';
  menu.innerHTML = `<div class="ctx-item" onclick="addFaceToNewCluster(${faceId})">Add to new cluster</div>`;
  document.body.appendChild(menu);
  const x = Math.min(e.clientX, window.innerWidth - 200);
  const y = Math.min(e.clientY, window.innerHeight - menu.offsetHeight - 10);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  setTimeout(() => document.addEventListener('click', closeContextMenu, {once: true}), 0);
}

async function addFaceToNewCluster(faceId) {
  closeContextMenu();
  if (_thumbsLoading) return;
  const cr = await fetch('/api/clusters', { method: 'POST', headers: {'Content-Type': 'application/json'} });
  const data = await cr.json();
  const newClusterId = data.id;
  if (!newClusterId) {
    showToast('Failed to create cluster');
    return;
  }
  const r = await fetch(`/api/faces/${faceId}/move`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cluster_id: newClusterId}),
  });
  if (!r.ok) {
    showToast('Move failed');
    return;
  }
  delete clusterFaces[activeCluster.id];
  delete firstThumb[activeCluster.id];
  await loadClusters();
  await selectCluster(newClusterId);
  showToast('Photo moved to new cluster');
}

function closeContextMenu() {
  const m = document.getElementById('ctx-menu');
  if (m) m.remove();
}

async function moveToGroup(clusterId, groupId) {
  closeContextMenu();
  await fetch(`/api/clusters/${clusterId}/group`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({group_id: groupId}),
  });
  const c = clusters.find(c => c.id === clusterId);
  if (c) c.group_id = groupId;
  if (activeCluster && activeCluster.id === clusterId) activeCluster.group_id = groupId;
  renderSidebar();
  if (activeCluster && activeCluster.id === clusterId) renderDetail();
}

async function dropOnGroup(e, groupId) {
  const clusterId = parseInt(e.dataTransfer.getData('text/plain'));
  if (isNaN(clusterId)) return;
  await moveToGroup(clusterId, groupId);
}

function moveToNewGroup(clusterId) {
  closeContextMenu();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.dataset.clusterId = String(clusterId);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h3>New group</h3>
      <input type="text" id="new-group-name-input" placeholder="Enter group name..."
             style="width:100%;padding:8px 12px;margin-bottom:16px;background:#0f1117;border:1px solid #2a2d3a;border-radius:6px;color:#e8eaed;font-size:14px">
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-save" onclick="confirmNewGroup()">OK</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const input = document.getElementById('new-group-name-input');
  input.focus();
  input.onkeydown = (e) => {
    if (e.key === 'Enter') confirmNewGroup();
    if (e.key === 'Escape') overlay.remove();
  };
}

async function confirmNewGroup() {
  const overlay = document.querySelector('.modal-overlay[data-cluster-id]');
  if (!overlay) return;
  const clusterId = parseInt(overlay.dataset.clusterId, 10);
  const input = document.getElementById('new-group-name-input');
  const name = input ? input.value.trim() : '';
  overlay.remove();
  if (!name) return;
  const r = await fetch('/api/groups', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name}),
  });
  const g = await r.json();
  await loadGroups();
  await moveToGroup(clusterId, g.id);
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '<div class="sidebar-header">Clusters'
    + '<span class="sidebar-actions">'
    + (groups.length > 0 ? '<span class="sidebar-action toggle-tree" onclick="toggleAllGroups()" title="Collapse/expand all groups">&#x229e;</span>' : '')
    + ' <span class="sidebar-action" onclick="promptNewGroup()" title="Group clusters together and give names like &#34;Igor Family&#34;, &#34;Alona Friends&#34;">+ Group</span>'
    + '</span></div>';
  if (_thumbsLoading) {
    html += `<div class="sidebar-loading">${esc(_thumbsProgress)}</div>`;
  }

  const sortedGroups = [...groups].sort((a, b) => a.name.localeCompare(b.name));
  for (const g of sortedGroups) {
    const members = sortClusters(clusters.filter(c => c.group_id === g.id));
    const collapsed = collapsedGroups.has(g.id);
    const arrow = collapsed ? '\u25b6' : '\u25bc';
    const count = members.reduce((s, c) => s + c.face_count, 0);
    html += `
      <div class="group-header" onclick="toggleGroup(${g.id})"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="event.preventDefault();this.classList.remove('drag-over');dropOnGroup(event,${g.id})">
        <span class="group-arrow">${arrow}</span>
        <span class="group-name">${esc(g.name)}</span>
        <span class="group-count">${members.length} clusters \u00b7 ${count} faces</span>
        <span class="group-actions">
          <span class="group-action" onclick="event.stopPropagation();renameGroup(${g.id},'${escJs(g.name)}')" title="Rename">\u270e</span>
          <span class="group-action" onclick="event.stopPropagation();deleteGroup(${g.id})" title="Delete group">\u2716</span>
        </span>
      </div>`;
    if (!collapsed) {
      for (const c of members) html += clusterItemHtml(c);
    }
  }

  const ungrouped = sortClusters(clusters.filter(c => !c.group_id));
  if (ungrouped.length > 0 && sortedGroups.length > 0) {
    html += `<div class="group-divider"
         ondragover="event.preventDefault();this.classList.add('drag-over')"
         ondragleave="this.classList.remove('drag-over')"
         ondrop="event.preventDefault();this.classList.remove('drag-over');dropOnGroup(event,null)">Ungrouped</div>`;
  }
  for (const c of ungrouped) html += clusterItemHtml(c);

  sidebar.innerHTML = html;
}

function toggleGroup(gid) {
  if (collapsedGroups.has(gid)) collapsedGroups.delete(gid);
  else collapsedGroups.add(gid);
  renderSidebar();
}

function toggleAllGroups() {
  const allCollapsed = groups.every(g => collapsedGroups.has(g.id));
  if (allCollapsed) collapsedGroups.clear();
  else groups.forEach(g => collapsedGroups.add(g.id));
  renderSidebar();
}

function promptNewGroup() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-new-group';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h3>New group</h3>
      <input type="text" id="prompt-new-group-input" placeholder="Enter group name..."
             style="width:100%;padding:8px 12px;margin-bottom:16px;background:#0f1117;border:1px solid #2a2d3a;border-radius:6px;color:#e8eaed;font-size:14px">
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-save" onclick="confirmPromptNewGroup()">OK</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('prompt-new-group-input').focus();
  document.getElementById('prompt-new-group-input').onkeydown = (e) => {
    if (e.key === 'Enter') confirmPromptNewGroup();
    if (e.key === 'Escape') overlay.remove();
  };
}

async function confirmPromptNewGroup() {
  const overlay = document.getElementById('modal-new-group');
  const input = document.getElementById('prompt-new-group-input');
  const name = input ? input.value.trim() : '';
  if (overlay) overlay.remove();
  if (!name) return;
  await fetch('/api/groups', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name}),
  });
  await loadGroups();
  renderSidebar();
}

function renameGroup(gid, oldName) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-rename-group';
  overlay.dataset.groupId = String(gid);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Rename group</h3>
      <input type="text" id="rename-group-input" value="${esc(oldName)}" placeholder="Enter name..."
             style="width:100%;padding:8px 12px;margin-bottom:16px;background:#0f1117;border:1px solid #2a2d3a;border-radius:6px;color:#e8eaed;font-size:14px">
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-save" onclick="confirmRenameGroup()">OK</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const inp = document.getElementById('rename-group-input');
  inp.focus();
  inp.select();
  inp.onkeydown = (e) => {
    if (e.key === 'Enter') confirmRenameGroup();
    if (e.key === 'Escape') overlay.remove();
  };
}

async function confirmRenameGroup() {
  const overlay = document.getElementById('modal-rename-group');
  if (!overlay) return;
  const gid = parseInt(overlay.dataset.groupId, 10);
  const input = document.getElementById('rename-group-input');
  const name = input ? input.value.trim() : '';
  overlay.remove();
  const g = groups.find(x => x.id === gid);
  if (!name || (g && g.name === name)) return;
  await fetch(`/api/groups/${gid}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name}),
  });
  await loadGroups();
  renderSidebar();
}

function deleteGroup(gid) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-delete-group';
  overlay.dataset.groupId = String(gid);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Delete group?</h3>
      <p style="color:#9aa0a6;margin-bottom:16px;font-size:14px">Clusters inside will become ungrouped.</p>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn" style="background:#6b2a2a;color:#fff" onclick="confirmDeleteGroup()">Delete</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function confirmDeleteGroup() {
  const overlay = document.getElementById('modal-delete-group');
  if (!overlay) return;
  const gid = parseInt(overlay.dataset.groupId, 10);
  overlay.remove();
  await fetch(`/api/groups/${gid}`, {method: 'DELETE'});
  clusters.forEach(c => { if (c.group_id === gid) c.group_id = null; });
  await loadGroups();
  renderSidebar();
}

async function selectCluster(id) {
  selectedFaces.clear();
  _lastSelectedIdx = -1;
  activeCluster = clusters.find(c => c.id === id);
  renderSidebar();
  if (!clusterFaces[id]) {
    const r = await fetch(`/api/clusters/${id}/faces`);
    clusterFaces[id] = await r.json();
  }
  const faces = clusterFaces[id] || [];
  if (faces.length > 0) {
    const thumbPathsInCluster = new Set(faces.map(f => f.thumb_path).filter(Boolean));
    const currentThumb = firstThumb[id];
    let needUpdate = false;
    if (currentThumb && currentThumb.startsWith('/thumbs/')) {
      const path = currentThumb.slice(8);
      if (!thumbPathsInCluster.has(path)) needUpdate = true;
    } else if (currentThumb && currentThumb.startsWith('data:')) {
      needUpdate = true;
    }
    if (needUpdate) {
      firstThumb[id] = `/thumbs/${faces[0].thumb_path}`;
      renderSidebar();
    }
  }
  const paths = faces.map(f => f.thumb_path).filter(Boolean);
  detailThumbCache = {};
  for (let i = 0; i < paths.length; i += 10) {
    const chunk = paths.slice(i, i + 10);
    const tr = await fetch('/api/thumbs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paths: chunk }),
    });
    const base64ByPath = await tr.json();
    for (const [p, b64] of Object.entries(base64ByPath)) {
      if (b64) detailThumbCache[p] = `data:image/jpeg;base64,${b64}`;
    }
  }
  renderDetail();
}

function renderDetail() {
  if (!activeCluster) return;
  const c = activeCluster;
  const faces = clusterFaces[c.id] || [];

  let html = `
    <div class="detail-header" data-cluster-id="${c.id}">
      <div class="field">
        <label>Person name</label>
        <input type="text" id="inp-name" value="${esc(c.name || '')}"
               placeholder="Enter name..." onkeydown="if(event.key==='Enter')saveCluster()">
      </div>
      <div class="field">
        <label>Birth year</label>
        <input type="number" id="inp-birth" value="${c.birth_year || ''}"
               placeholder="e.g. 1947" min="1800" max="2030"
               onkeydown="if(event.key==='Enter')saveCluster()">
      </div>
      <div class="field" style="justify-content:flex-end">
        <label>&nbsp;</label>
        <button class="btn btn-save" onclick="saveCluster()">Save</button>
      </div>
      <div class="field">
        <label>Group</label>
        <select id="inp-group" onchange="assignGroup()">
          <option value="">— None —</option>
          ${groups.map(g => `<option value="${g.id}" ${c.group_id === g.id ? 'selected' : ''}>${esc(g.name)}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="justify-content:flex-end; margin-left:auto">
        <label>&nbsp;</label>
        <button class="btn btn-merge" onclick="showMergeModal()">Merge into...</button>
      </div>
    </div>
    ${selectedFaces.size > 0 ? `<div class="face-select-bar">
      <span>${selectedFaces.size} selected — drag to a cluster to move</span>
      <button onclick="selectedFaces.clear();_lastSelectedIdx=-1;renderDetail()">Clear</button>
    </div>` : ''}
    <div class="face-grid">`;

  for (const f of faces) {
    const year = f.photo_date ? f.photo_date.substring(0, 4) : '?';
    let ageStr = '';
    if (c.birth_year && f.photo_date) {
      const photoYear = parseInt(f.photo_date.substring(0, 4));
      if (!isNaN(photoYear)) ageStr = `age ~${photoYear - c.birth_year}`;
    }
    const shortPath = f.file_path.length > 50
      ? '...' + f.file_path.slice(-47) : f.file_path;
    const faceId = f.face_id != null ? f.face_id : f.id;

    const isSelected = selectedFaces.has(faceId);
    html += `
      <div class="face-card${isSelected ? ' selected' : ''}" onclick="copyPath('${escJs(f.file_path)}')"
           title="Click to copy path. Check box to select for bulk move. Drag to a cluster to move. Right-click for menu."
           draggable="true"
           ondragstart="startFaceDrag(event,${faceId})"
           oncontextmenu="event.preventDefault();event.stopPropagation();showFaceContextMenu(event,${faceId})">
        <div class="sel-check" onclick="event.stopPropagation();toggleFaceSelect(event,${faceId},${faces.indexOf(f)})">${isSelected ? '✓' : ''}</div>
        <img src="${detailThumbCache[f.thumb_path] || `/thumbs/${f.thumb_path}`}" alt="face" loading="lazy" draggable="false">
        <div class="meta">
          <span class="date">${year}</span>
          ${ageStr ? `<span class="age">${ageStr}</span>` : ''}
          <div class="path">${esc(shortPath)}</div>
        </div>
      </div>`;
  }
  html += '</div>';
  document.getElementById('main').innerHTML = html;
}

function toggleFaceSelect(event, faceId, idx) {
  const faces = clusterFaces[activeCluster?.id] || [];
  if (event.shiftKey && _lastSelectedIdx >= 0) {
    const lo = Math.min(idx, _lastSelectedIdx);
    const hi = Math.max(idx, _lastSelectedIdx);
    for (let i = lo; i <= hi; i++) {
      const f = faces[i];
      if (f) selectedFaces.add(f.face_id != null ? f.face_id : f.id);
    }
  } else {
    if (selectedFaces.has(faceId)) selectedFaces.delete(faceId);
    else selectedFaces.add(faceId);
    _lastSelectedIdx = idx;
  }
  renderDetail();
}

async function assignGroup() {
  if (!activeCluster) return;
  const val = document.getElementById('inp-group').value;
  const group_id = val ? parseInt(val) : null;
  await fetch(`/api/clusters/${activeCluster.id}/group`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({group_id}),
  });
  activeCluster.group_id = group_id;
  const idx = clusters.findIndex(c => c.id === activeCluster.id);
  if (idx >= 0) clusters[idx].group_id = group_id;
  renderSidebar();
  showToast(group_id ? 'Assigned to group' : 'Removed from group');
}

async function saveCluster() {
  const header = document.querySelector('.detail-header[data-cluster-id]');
  const clusterId = header ? parseInt(header.getAttribute('data-cluster-id'), 10) : (activeCluster && activeCluster.id);
  if (clusterId == null || isNaN(clusterId)) return;
  const name = document.getElementById('inp-name').value.trim() || null;
  const birthStr = document.getElementById('inp-birth').value.trim();
  const birth_year = birthStr ? parseInt(birthStr) : null;

  const r = await fetch(`/api/clusters/${clusterId}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, birth_year}),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    showToast(err.error || 'Save failed');
    return;
  }
  const c = clusters.find(c => c.id === clusterId);
  if (c) {
    c.name = name;
    c.birth_year = birth_year;
  }
  if (activeCluster && activeCluster.id === clusterId) {
    activeCluster.name = name;
    activeCluster.birth_year = birth_year;
  }
  renderSidebar();
  renderDetail();
  loadStats();
  showToast('Saved!');
}

function copyPath(filePath) {
  navigator.clipboard.writeText(filePath).then(() => {
    showToast('Path copied: ' + filePath.split('\\').pop());
  });
}

function showMergeModal() {
  if (!activeCluster) return;
  const others = clusters.filter(c => c.id !== activeCluster.id);
  const named = others.filter(c => c.name).sort((a, b) => a.name.localeCompare(b.name));
  const unnamed = others.filter(c => !c.name).sort((a, b) => b.face_count - a.face_count);
  const sorted = [...named, ...unnamed];

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = `
    <div class="modal">
      <h3>Merge "${esc(activeCluster.name || 'Unnamed')}" into:</h3>
      <input class="merge-search" type="text" placeholder="Search…" autocomplete="off">
      <div class="merge-list"></div>
    </div>`;
  document.body.appendChild(overlay);

  const listEl = overlay.querySelector('.merge-list');
  const searchEl = overlay.querySelector('.merge-search');

  function renderList(query) {
    let rx = null;
    if (query) {
      try { rx = new RegExp(query, 'i'); } catch { rx = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i'); }
    }
    const visible = rx ? sorted.filter(c => rx.test(c.name || '') || rx.test(String(c.id))) : sorted;
    if (!visible.length) {
      listEl.innerHTML = '<div class="merge-no-results">No matches</div>';
      return;
    }
    listEl.innerHTML = visible.map(c => {
      const name = c.name || 'Unnamed';
      const thumb = firstThumb[c.id] || '';
      return `<div class="merge-target" onclick="doMerge(${activeCluster.id}, ${c.id})">
        ${thumb ? `<img src="${thumb}" alt="">` : '<div style="width:32px;height:32px;border-radius:50%;background:#2a2d3a"></div>'}
        <span>${esc(name)} (${c.face_count} photos)</span>
      </div>`;
    }).join('');
  }

  renderList('');
  searchEl.focus();
  searchEl.addEventListener('input', () => renderList(searchEl.value.trim()));
  searchEl.addEventListener('keydown', e => {
    if (e.key === 'Escape') { overlay.remove(); e.stopPropagation(); }
    if (e.key === 'Enter') {
      const first = listEl.querySelector('.merge-target');
      if (first) first.click();
    }
  });
}

async function doMerge(sourceId, targetId) {
  await fetch('/api/clusters/merge', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({source_id: sourceId, target_id: targetId}),
  });
  document.querySelector('.modal-overlay')?.remove();
  delete clusterFaces[sourceId];
  delete clusterFaces[targetId];
  activeCluster = null;
  await loadClusters();
  await loadStats();
  selectCluster(targetId);
  showToast('Clusters merged!');
}

// ═══════════════════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════════════════

async function init() {
  await loadBackend();
  await loadStats();
  await loadFolders();

  const scanR = await fetch('/api/scan/status');
  const scanData = await scanR.json();

  if (['loading_model', 'scanning', 'clustering'].includes(scanData.status)) {
    switchTab('scanner');
    updateScanUI(scanData);
    connectSSE();
  } else {
    const statsR = await fetch('/api/stats');
    const stats = await statsR.json();
    if (scanData.status !== 'idle') updateScanUI(scanData);
    if (stats.faces > 0) {
      switchTab('review');
    } else {
      switchTab('scanner');
    }
  }
}

init();
</script>
